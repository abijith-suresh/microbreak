<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  <!-- Decorative accent lines -->
  <line x1="80" y1="200" x2="1120" y2="200" stroke="#c45d3e" stroke-width="2" opacity="0.3"/>
  <line x1="80" y1="430" x2="1120" y2="430" stroke="#c45d3e" stroke-width="2" opacity="0.3"/>
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="400" font-style="italic" fill="#ffffff" letter-spacing="-1">
    Microbreak
  </text>
  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="300" fill="#a0a0b0" letter-spacing="3">
    Puzzles for the gaps between builds
  </text>
  <!-- Accent bar -->
  <rect x="540" y="405" width="120" height="4" rx="2" fill="#c45d3e" opacity="0.6"/>
  <!-- Bottom tag -->
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#606078" letter-spacing="4" text-transform="uppercase">
    No ads · No tracking · Just puzzles
  </text>
</svg>
